<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1d232a"/>
  <!-- pixel castle -->
  <g fill="#e0a82b" transform="translate(200, 120)">
    <!-- base walls -->
    <rect x="40" y="120" width="20" height="60"/>
    <rect x="60" y="120" width="20" height="60"/>
    <rect x="80" y="120" width="20" height="60"/>
    <rect x="100" y="120" width="20" height="60"/>
    <rect x="120" y="120" width="20" height="60"/>
    <rect x="140" y="120" width="20" height="60"/>
    <rect x="160" y="120" width="20" height="60"/>
    <rect x="180" y="120" width="20" height="60"/>
    <rect x="200" y="120" width="20" height="60"/>
    <rect x="220" y="120" width="20" height="60"/>
    <rect x="240" y="120" width="20" height="60"/>
    <rect x="260" y="120" width="20" height="60"/>
    <!-- center tower -->
    <rect x="120" y="40" width="20" height="80"/>
    <rect x="140" y="40" width="20" height="80"/>
    <rect x="160" y="40" width="20" height="80"/>
    <rect x="180" y="40" width="20" height="80"/>
    <!-- battlements top -->
    <rect x="120" y="20" width="20" height="20"/>
    <rect x="160" y="20" width="20" height="20"/>
    <!-- side towers -->
    <rect x="40" y="80" width="20" height="100"/>
    <rect x="40" y="60" width="20" height="20"/>
    <rect x="60" y="60" width="20" height="20"/>
    <rect x="240" y="80" width="20" height="100"/>
    <rect x="240" y="60" width="20" height="20"/>
    <rect x="220" y="60" width="20" height="20"/>
    <!-- gate -->
    <rect x="140" y="160" width="20" height="20"/>
    <rect x="160" y="160" width="20" height="20"/>
    <rect x="140" y="140" width="20" height="20" fill="#1d232a"/>
    <rect x="160" y="140" width="20" height="20" fill="#1d232a"/>
    <!-- windows -->
    <rect x="100" y="80" width="20" height="20" fill="#1d232a"/>
    <rect x="200" y="80" width="20" height="20" fill="#1d232a"/>
    <!-- ground -->
    <rect x="20" y="180" width="280" height="20" fill="#2a3a2a"/>
    <rect x="20" y="200" width="280" height="10" fill="#1a2a1a"/>
  </g>
  <!-- title -->
  <text x="440" y="280" font-family="serif" font-size="96" font-weight="bold" fill="#e0a82b">General E</text>
  <text x="440" y="350" font-family="sans-serif" font-size="28" fill="#a0aab4">Online Multiplayer Strategy Game</text>
  <text x="440" y="390" font-family="sans-serif" font-size="20" fill="#68707a">Play in your browser. Free. No download.</text>
</svg>
