name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Types check
        run: cd packages/types && bun run build

      - name: Biome check
        run: bun run ci:lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Compile backend binary
        run: bun build --compile ./packages/backend/src/index.ts --outfile /tmp/generale-server

      - name: Audit
        run: bun audit --prod || true

  package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Compile backend binary
        run: |
          bun build --compile \
            ./packages/backend/src/index.ts \
            --outfile ./generale-server/server

      - name: Assemble deploy package
        run: |
          mkdir -p generale-server/frontend generale-server/migrations generale-server/public/avatars/default
          cp -r packages/frontend/dist/* generale-server/frontend/
          cp -r packages/backend/drizzle/* generale-server/migrations/
          cp -r packages/backend/public/avatars/default/* generale-server/public/avatars/default/
          cp packages/backend/.env.example generale-server/
          cp scripts/start.sh generale-server/
          chmod +x generale-server/start.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: generale-server
          path: generale-server/
