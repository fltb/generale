name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build types
        run: cd packages/types && bun run build

      - name: Biome check
        run: bun run ci:lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

      - name: Frontend build
        run: bun run --filter=frontend build

  package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build types
        run: cd packages/types && bun run build

      - name: Build frontend
        run: bun run --filter=frontend build

      - name: Compile backend binary
        run: |
          bun build --compile \
            ./packages/backend/src/index.ts \
            --outfile ./dist/server

      - name: Assemble deploy package
        run: |
          mkdir -p dist/frontend dist/migrations dist/public/avatars/default
          cp -r packages/frontend/dist/* dist/frontend/
          cp -r packages/backend/drizzle/* dist/migrations/
          cp -r packages/backend/public/avatars/default/* dist/public/avatars/default/
          cp packages/backend/.env.example dist/.env.example
          cp scripts/start.sh dist/
          chmod +x dist/start.sh
          tar czf generale-server.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: generale-server
          path: generale-server.tar.gz
